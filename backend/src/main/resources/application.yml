server:
  port: 8080

spring:
  application:
    name: person-blog-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
  refresh:
    ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:604800}
  cookie:
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAME_SITE:Strict}
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:15}
    max-content-length: ${DEEPSEEK_MAX_CONTENT_LENGTH:20000}
    max-question-length: ${DEEPSEEK_MAX_QUESTION_LENGTH:500}
